version: "3.9"

services:
  # ── MongoDB ──
  mongo:
    image: mongo:6
    container_name: jj-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-changeme}
    volumes:
      - mongo-data:/data/db
    networks:
      - jj-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (Node / Express) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jj-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-changeme}@mongo:27017/jandj_infra?authSource=admin
    networks:
      - jj-network
    volumes:
      - backend-uploads:/app/uploads

  # ── Frontend (React / Vite → nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
    container_name: jj-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jj-network

networks:
  jj-network:
    driver: bridge

volumes:
  mongo-data:
  backend-uploads:
